<mat-drawer-container class="layout-container" autosize>

  <!-- ── Right-side hamburger drawer ── -->
  <mat-drawer #drawer mode="over" position="end" class="app-drawer">

    <!-- User section -->
    <div class="drawer-user">
      <app-avatar
        [name]="userName"
        [photoUrl]="avatarUrl"
        size="lg"
        [editable]="true"
        (photoChange)="onAvatarChange($event)"
      />
      <div class="drawer-user__info">
        <span class="drawer-user__name">{{ userName }}</span>
        <span class="drawer-user__email">{{ userEmail }}</span>
        @if (userRole) {
          <span class="drawer-user__role">{{ userRole }}</span>
        }
      </div>
    </div>

    <mat-divider />

    <!-- Navigation links -->
    <nav class="drawer-nav" aria-label="App navigation">
      <button class="drawer-nav__item" (click)="navigateTo('/dashboard')">
        <i class="fa-solid fa-gauge-high" aria-hidden="true"></i>
        <span>Dashboard</span>
      </button>
      <button class="drawer-nav__item" (click)="navigateTo('/tasks')">
        <i class="fa-solid fa-list-check" aria-hidden="true"></i>
        <span>My Tasks</span>
      </button>
      @if (canAccessChecklists) {
        <button class="drawer-nav__item" (click)="navigateTo('/checklists')">
          <i class="fa-solid fa-clipboard-list" aria-hidden="true"></i>
          <span>Checklists</span>
        </button>
      }
      @if (canAccessTeam) {
        <button class="drawer-nav__item" (click)="navigateTo('/team')">
          <i class="fa-solid fa-users" aria-hidden="true"></i>
          <span>Team</span>
        </button>
      }
      @if (canAccessSettings) {
        <button class="drawer-nav__item" (click)="navigateTo('/settings')">
          <i class="fa-solid fa-gear" aria-hidden="true"></i>
          <span>Settings</span>
        </button>
      }
    </nav>

    <mat-divider />

    <!-- Theme toggle -->
    <div class="drawer-section">
      <span class="drawer-section__label">Appearance</span>
      <div class="theme-seg" role="group" aria-label="Appearance preference">
        <button
          class="theme-seg__btn"
          [class.theme-seg__btn--active]="theme.mode() === 'light'"
          (click)="theme.setMode('light')"
          aria-label="Light mode"
          [attr.aria-pressed]="theme.mode() === 'light'">
          <i class="fa-solid fa-sun" aria-hidden="true"></i>
          <span>Light</span>
        </button>
        <button
          class="theme-seg__btn"
          [class.theme-seg__btn--active]="theme.mode() === 'system'"
          (click)="theme.setMode('system')"
          aria-label="Auto (follow system)"
          [attr.aria-pressed]="theme.mode() === 'system'">
          <i class="fa-solid fa-circle-half-stroke" aria-hidden="true"></i>
          <span>Auto</span>
        </button>
        <button
          class="theme-seg__btn"
          [class.theme-seg__btn--active]="theme.mode() === 'dark'"
          (click)="theme.setMode('dark')"
          aria-label="Dark mode"
          [attr.aria-pressed]="theme.mode() === 'dark'">
          <i class="fa-solid fa-moon" aria-hidden="true"></i>
          <span>Dark</span>
        </button>
      </div>
    </div>

    <mat-divider />

    <div class="drawer-section">
      <span class="drawer-section__label">Dev Tools</span>
      <div class="theme-seg" role="group" aria-label="Checklist mode override">
        <button
          class="theme-seg__btn"
          [class.theme-seg__btn--active]="checklistModeService.mode() === 'personal'"
          (click)="setChecklistMode('personal')"
          aria-label="Use personal checklist mode"
          [attr.aria-pressed]="checklistModeService.mode() === 'personal'">
          <i class="fa-solid fa-user-lock" aria-hidden="true"></i>
          <span>Personal</span>
        </button>
        <button
          class="theme-seg__btn"
          [class.theme-seg__btn--active]="checklistModeService.mode() === 'practice'"
          (click)="setChecklistMode('practice')"
          aria-label="Use practice checklist mode"
          [attr.aria-pressed]="checklistModeService.mode() === 'practice'">
          <i class="fa-solid fa-users" aria-hidden="true"></i>
          <span>Practice</span>
        </button>
      </div>
    </div>

    <mat-divider />

    <!-- Sign out -->
    <div class="drawer-footer">
      <button class="drawer-signout" (click)="signOut()">
        <i class="fa-solid fa-right-from-bracket" aria-hidden="true"></i>
        <span>Sign out</span>
      </button>
    </div>

  </mat-drawer>

  <!-- ── Main content ── -->
  <mat-drawer-content class="layout-content">

    <!-- Top nav -->
    <header class="top-nav" role="banner">
      <a routerLink="/dashboard" class="top-nav__brand" aria-label="ChekLists home">
        <i class="fa-solid fa-circle-check top-nav__logo-icon" aria-hidden="true"></i>
        <span>ChekLists</span>
      </a>

      <div class="top-nav__actions">
        @if (canAccessChecklists) {
          <button
            mat-icon-button
            routerLink="/checklists/new"
            aria-label="Create new checklist"
            matTooltip="New checklist"
            class="nav-icon-btn"
          >
            <i class="fa-solid fa-circle-plus" aria-hidden="true"></i>
          </button>
        }
        <button
          mat-icon-button
          (click)="toggleDrawer()"
          aria-label="Open menu"
          matTooltip="Menu"
          class="nav-icon-btn nav-hamburger"
        >
          <i class="fa-solid fa-bars" aria-hidden="true"></i>
        </button>
      </div>
    </header>

    <!-- Page content -->
    <main id="main-content" tabindex="-1">
      <router-outlet />
    </main>

  </mat-drawer-content>

</mat-drawer-container>
